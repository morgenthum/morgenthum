<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">
  <meta name="author" content="{{ config.author }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% block og_title %}{{ config.title }}{% endblock %}">
  <meta property="og:description" content="{% block og_description %}{{ config.description }}{% endblock %}">
  <meta property="og:type" content="{% block og_type %}website{% endblock %}">
  <meta property="og:url" content="{{ current_url | default(value=config.base_url) }}">

  <!-- Feeds -->
  {% if config.generate_feeds %}
  <link rel="alternate" type="application/rss+xml" title="RSS" href="{{ get_url(path='rss.xml') }}">
  {% endif %}

  <!-- Favicon -->
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml">

  <!-- Preload fonts -->
  <link rel="preload" href="/fonts/PlusJakartaSans-Variable.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/SourceSerif4-Variable-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/JetBrainsMono-Variable.woff2" as="font" type="font/woff2" crossorigin>

  <!-- Theme initialization (prevent flash) -->
  <script>
    (function() {
      var theme = localStorage.getItem('theme');
      if (!theme) {
        theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- Styles -->
  <link rel="stylesheet" href="/main.css">
</head>
<body>

  <nav class="nav">
    <div class="nav__inner">
      <a href="/" class="nav__brand">morgenthum.dev</a>
      <ul class="nav__links">
        <li><a href="/blog/">Blog</a></li>
        <li><a href="/tags/">Tags</a></li>
        <li><a href="{{ config.extra.github }}" target="_blank" rel="noopener">GitHub</a></li>
        <li>
          <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
        </li>
      </ul>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <span class="footer__text">&copy; {{ now() | date(format="%Y") }} Mario Morgenthum</span>
      <ul class="footer__links">
        <li><a href="{{ config.extra.github }}" target="_blank" rel="noopener">GitHub</a></li>
        <li><a href="{{ get_url(path='rss.xml') }}">RSS</a></li>
      </ul>
    </div>
  </footer>

  <script src="/js/theme.js"></script>
  <script src="/js/copy-code.js"></script>
</body>
</html>

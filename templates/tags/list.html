{% extends "base.html" %}

{% block title %}Tags - {{ config.title }}{% endblock %}

{% block content %}
<div class="container">
  <div class="page-header">
    <h1 class="page-header__title">Tags</h1>
    <p class="page-header__description">Browse all topics</p>
  </div>

  <div class="tag-cloud">
    {% for term in terms %}
    <a href="{{ term.permalink }}" class="tag">{{ term.name }} ({{ term.pages | length }})</a>
    {% endfor %}
  </div>
</div>
{% endblock %}
